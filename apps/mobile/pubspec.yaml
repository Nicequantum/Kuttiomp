name: kuttiomp_mobile
description: Kuttiomp — Narragansett Language Revitalization Mobile App
publish_to: "none"
version: 0.4.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  record: ^5.1.2
  audioplayers: ^6.1.0
  geolocator: ^13.0.2
  flutter_dotenv: ^5.2.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env